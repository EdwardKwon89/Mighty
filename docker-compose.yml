version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mighty-postgres
    environment:
      POSTGRES_USER: mighty_user
      POSTGRES_PASSWORD: mighty_password
      POSTGRES_DB: mighty_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mighty-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
